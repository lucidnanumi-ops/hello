<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D 타워 디펜스 & 구글 시트 실시간 랭킹</title>
  <!-- Tailwind CSS 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons 로드 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');
    body {
      font-family: 'Noto Sans KR', sans-serif;
    }
    .cyber-font {
      font-family: 'Orbitron', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center py-6 px-4">

  <!-- 헤더 영역 -->
  <header class="text-center mb-6">
    <h1 class="text-4xl font-extrabold tracking-wider cyber-font text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-indigo-400 to-purple-500 mb-2">
      NEON DEFENSE
    </h1>
    <p class="text-sm text-slate-400">구글 시트 실시간 랭킹 연동 디펜스 게임</p>
  </header>

  <!-- 메인 게임 영역 컨테이너 -->
  <main class="w-full max-w-6xl flex flex-col lg:flex-row gap-6 justify-center items-start">
    
    <!-- 왼쪽: 게임 화면 및 컨트롤러 -->
    <div class="flex-1 bg-slate-900/80 border border-slate-800 rounded-2xl p-4 shadow-2xl backdrop-blur-sm w-full">
      
      <!-- 닉네임 입력 및 시작 제어부 -->
      <div class="flex flex-wrap items-center justify-between gap-4 mb-4 pb-4 border-b border-slate-800">
        <div class="flex items-center gap-2">
          <label for="nickname" class="text-xs font-semibold uppercase tracking-wider text-slate-400">플레이어 이름:</label>
          <input 
            type="text" 
            id="nickname" 
            value="NeonRider" 
            maxlength="12"
            class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-cyan-300 font-bold focus:outline-none focus:border-cyan-500 transition-colors w-36"
          />
        </div>
        <div class="flex items-center gap-2">
          <button 
            id="btn-start" 
            onclick="startGame()" 
            class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-1.5 px-5 rounded-lg shadow-lg hover:shadow-emerald-500/20 active:scale-95 transition text-sm flex items-center gap-1.5"
          >
            <i data-lucide="play" class="w-4 h-4"></i> 게임 시작
          </button>
        </div>
      </div>

      <!-- 상단 스탯 인터페이스 -->
      <div class="grid grid-cols-4 gap-2 mb-4">
        <div class="bg-slate-950/60 p-2.5 rounded-xl border border-slate-800/80 text-center">
          <div class="text-[10px] text-red-400 uppercase font-bold tracking-wider">라이프</div>
          <div id="stat-life" class="text-lg font-bold cyber-font text-red-500">20</div>
        </div>
        <div class="bg-slate-950/60 p-2.5 rounded-xl border border-slate-800/80 text-center">
          <div class="text-[10px] text-amber-400 uppercase font-bold tracking-wider">골드</div>
          <div id="stat-gold" class="text-lg font-bold cyber-font text-amber-500">250</div>
        </div>
        <div class="bg-slate-950/60 p-2.5 rounded-xl border border-slate-800/80 text-center">
          <div class="text-[10px] text-cyan-400 uppercase font-bold tracking-wider">웨이브</div>
          <div id="stat-wave" class="text-lg font-bold cyber-font text-cyan-400">0/10</div>
        </div>
        <div class="bg-slate-950/60 p-2.5 rounded-xl border border-slate-800/80 text-center">
          <div class="text-[10px] text-purple-400 uppercase font-bold tracking-wider">현재 점수</div>
          <div id="stat-score" class="text-lg font-bold cyber-font text-purple-400">0</div>
        </div>
      </div>

      <!-- 게임 캔버스 영역 -->
      <div class="relative overflow-hidden rounded-xl border-2 border-slate-800 bg-slate-950 aspect-[3/2] w-full">
        <canvas id="gameCanvas" class="absolute inset-0 w-full h-full block cursor-crosshair"></canvas>
        
        <!-- 오버레이 화면 (대기/일시정지/종료) -->
        <div id="overlay" class="absolute inset-0 bg-slate-950/90 flex flex-col items-center justify-center text-center p-6 transition-all duration-300">
          <div id="overlay-icon" class="text-cyan-500 mb-3 animate-pulse">
            <i data-lucide="shield" class="w-16 h-16"></i>
          </div>
          <h2 id="overlay-title" class="text-2xl font-black mb-2 tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400">
            NEON DEFENSE에 오신 것을 환영합니다
          </h2>
          <p id="overlay-desc" class="text-sm text-slate-400 max-w-md mb-6 leading-relaxed">
            타워를 세워 몰려오는 보안 데이터 패킷(적)들의 침입을 방어하세요. 게임 오버 혹은 최종 승리 시 당신의 랭킹 스코어가 구글 시트에 자동으로 반영됩니다!
          </p>
          <button 
            id="overlay-btn"
            onclick="startGame()"
            class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black py-2.5 px-8 rounded-full shadow-lg shadow-cyan-500/20 active:scale-95 transition-all text-sm uppercase tracking-widest"
          >
            시스템 가동 (START)
          </button>
        </div>
      </div>

      <!-- 타워 건설 메뉴 -->
      <div class="mt-4 p-3 bg-slate-950/60 rounded-xl border border-slate-800">
        <div class="text-xs font-bold uppercase text-slate-500 mb-2 tracking-widest">설치 가능 타워</div>
        <div class="grid grid-cols-3 gap-2">
          <!-- 기본 타워 -->
          <button 
            onclick="selectTowerType('basic')" 
            id="btn-tower-basic"
            class="tower-select-btn border-2 border-cyan-500/50 bg-cyan-950/20 hover:bg-cyan-950/40 p-2.5 rounded-lg flex flex-col items-center gap-1 transition-all"
          >
            <div class="w-6 h-6 rounded-full bg-cyan-500 flex items-center justify-center text-slate-950 font-bold text-xs">P</div>
            <span class="text-xs font-bold text-cyan-300">펄스 포탑</span>
            <span class="text-[10px] text-amber-400 font-semibold">100G</span>
          </button>
          <!-- 프로스트 타워 -->
          <button 
            onclick="selectTowerType('frost')" 
            id="btn-tower-frost"
            class="tower-select-btn border border-slate-800 bg-slate-900/40 hover:bg-slate-900/80 p-2.5 rounded-lg flex flex-col items-center gap-1 transition-all"
          >
            <div class="w-6 h-6 rounded-full bg-blue-500 flex items-center justify-center text-slate-950 font-bold text-xs">F</div>
            <span class="text-xs font-bold text-blue-300">동결 디바이스</span>
            <span class="text-[10px] text-amber-400 font-semibold">150G</span>
          </button>
          <!-- 레이저 타워 -->
          <button 
            onclick="selectTowerType('laser')" 
            id="btn-tower-laser"
            class="tower-select-btn border border-slate-800 bg-slate-900/40 hover:bg-slate-900/80 p-2.5 rounded-lg flex flex-col items-center gap-1 transition-all"
          >
            <div class="w-6 h-6 rounded-full bg-fuchsia-500 flex items-center justify-center text-slate-100 font-bold text-xs">L</div>
            <span class="text-xs font-bold text-fuchsia-300">레이저 블래스터</span>
            <span class="text-[10px] text-amber-400 font-semibold">250G</span>
          </button>
        </div>
      </div>

    </div>

    <!-- 오른쪽: 실시간 랭킹 시스템 -->
    <div class="w-full lg:w-80 bg-slate-900/80 border border-slate-800 rounded-2xl p-5 shadow-2xl flex flex-col self-stretch">
      <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-4">
        <h3 class="font-black text-lg cyber-font tracking-wide flex items-center gap-2 text-cyan-400">
          <i data-lucide="trophy" class="w-5 h-5 text-amber-400"></i> TOP 10 랭킹
        </h3>
        <!-- 수동 리프레시 버튼 -->
        <button 
          onclick="fetchLeaderboard()" 
          id="btn-refresh"
          class="text-slate-400 hover:text-cyan-400 transition-colors p-1"
          title="랭킹 수동 갱신"
        >
          <i data-lucide="rotate-cw" class="w-4 h-4" id="refresh-icon"></i>
        </button>
      </div>

      <!-- 리더보드 테이블 -->
      <div class="flex-1 overflow-y-auto max-h-[480px] rounded-lg border border-slate-800/80 bg-slate-950/60">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-slate-500 border-b border-slate-800 text-xs uppercase tracking-wider">
              <th class="py-2.5 px-3 text-center w-12">순위</th>
              <th class="py-2.5 px-3 text-left">닉네임</th>
              <th class="py-2.5 px-3 text-right">점수</th>
            </tr>
          </thead>
          <tbody id="scoreBody">
            <tr>
              <td colspan="3" class="py-8 text-center text-slate-500">
                <div class="flex flex-col items-center justify-center gap-2">
                  <div class="animate-spin rounded-full h-5 w-5 border-2 border-cyan-500 border-t-transparent"></div>
                  <span>랭킹 목록 로드 중...</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="mt-4 pt-3 border-t border-slate-800/80 text-[11px] text-slate-500 text-center leading-relaxed">
        플레이를 종료하거나 최종 웨이브를 클리어하면<br/>
        자동으로 구글 스프레드시트에 전송됩니다.
      </div>
    </div>

  </main>

  <!-- 알림 모달 창 (기존 브라우저 alert 대체용) -->
  <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 border border-slate-700 text-slate-100 py-3 px-5 rounded-xl shadow-2xl flex items-center gap-3 transform translate-y-24 opacity-0 pointer-events-none transition-all duration-300 z-50">
    <div id="toast-icon-bg" class="w-8 h-8 rounded-full flex items-center justify-center text-slate-950">
      <i data-lucide="info" class="w-4 h-4" id="toast-icon"></i>
    </div>
    <div>
      <h4 id="toast-title" class="font-bold text-sm text-white">알림</h4>
      <p id="toast-message" class="text-xs text-slate-400">메시지 내용입니다.</p>
    </div>
  </div>

  <script>
    // 🌟 구글 앱스 스크립트 웹 앱 배포 주소
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxX1QbPxb4ggcaweB4rw0vH5G3R_NLQ21upu1uSuzKrs-OxKrQkMFXVxoZHCCKxtogM/exec";

    // --- 게임 디자인 상수 및 상태 변수 ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // 원본 설계 크기 설정 (화면 배율 대응용)
    const BASE_WIDTH = 600;
    const BASE_HEIGHT = 400;
    
    let life = 20;
    let gold = 250;
    let currentWave = 0;
    const maxWaves = 10;
    let score = 0;
    let gameActive = false;
    let selectedTowerType = 'basic'; // 현재 선택된 타워 종류 ('basic', 'frost', 'laser')

    let towers = [];
    let enemies = [];
    let bullets = [];
    let particles = [];
    let spawnQueue = [];
    let waveSpawning = false;
    let lastTime = 0;
    let spawnTimer = 0;

    // 로컬 백업 랭킹 리스트 (구글 서버 통신 장애 시 제공되는 시뮬레이션용 데이터 및 오프라인 보존용)
    let localScores = [
      ["NeonMaster", 2500],
      ["CyberShield", 1800],
      ["DataGuard", 1200],
      ["GateKeeper", 950],
      ["SafeMode", 600]
    ];

    // 타워 타입별 정보 스펙
    const TOWER_SPECS = {
      basic: { cost: 100, range: 100, color: '#06b6d4', damage: 25, speed: 1.0, label: 'P' },
      frost: { cost: 150, range: 80, color: '#3b82f6', damage: 5, speed: 0.8, isFrost: true, label: 'F' },
      laser: { cost: 250, range: 130, color: '#d946ef', damage: 45, speed: 1.8, label: 'L' }
    };

    // 디펜스 경로 노드 (상대 좌표 % 기준 설정하여 완벽 반응형 대응)
    const WAYPOINTS = [
      { x: 0.0, y: 0.2 },
      { x: 0.4, y: 0.2 },
      { x: 0.4, y: 0.7 },
      { x: 0.8, y: 0.7 },
      { x: 0.8, y: 0.4 },
      { x: 1.0, y: 0.4 }
    ];

    // --- 모바일 및 반응형 캔버스 크기 맞추기 ---
    function resizeCanvas() {
      const container = canvas.parentElement;
      const rect = container.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.width * (2/3); // 3:2 비율 유지
    }

    // 반응형 스케일 계산 유틸리티
    function scaleX(val) { return (val / BASE_WIDTH) * canvas.width; }
    function scaleY(val) { return (val / BASE_HEIGHT) * canvas.height; }
    function unscaleX(val) { return (val / canvas.width) * BASE_WIDTH; }
    function unscaleY(val) { return (val / canvas.height) * BASE_HEIGHT; }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('load', () => {
      resizeCanvas();
      lucide.createIcons();
      fetchLeaderboard();
    });

    // --- 커스텀 Toast 메시지 팝업 기능 (alert 대체) ---
    function showToast(title, message, type = 'info') {
      const toast = document.getElementById("toast");
      const titleEl = document.getElementById("toast-title");
      const msgEl = document.getElementById("toast-message");
      const iconBg = document.getElementById("toast-icon-bg");
      
      titleEl.innerText = title;
      msgEl.innerText = message;
      
      // 타입별 색상 조정
      if (type === 'success') {
        iconBg.className = "w-8 h-8 rounded-full flex items-center justify-center bg-emerald-500 text-slate-950";
        toast.querySelector('[data-lucide]').setAttribute('data-lucide', 'check-circle');
      } else if (type === 'error') {
        iconBg.className = "w-8 h-8 rounded-full flex items-center justify-center bg-rose-500 text-white";
        toast.querySelector('[data-lucide]').setAttribute('data-lucide', 'alert-circle');
      } else {
        iconBg.className = "w-8 h-8 rounded-full flex items-center justify-center bg-cyan-500 text-slate-950";
        toast.querySelector('[data-lucide]').setAttribute('data-lucide', 'info');
      }
      lucide.createIcons();

      // 보이기 효과
      toast.classList.remove("translate-y-24", "opacity-0", "pointer-events-none");
      
      // 3.5초 뒤 숨기기
      setTimeout(() => {
        toast.classList.add("translate-y-24", "opacity-0", "pointer-events-none");
      }, 3500);
    }

    // --- 구글 스프레드시트 랭킹 연동 및 오프라인 예외 처리 보강 ---

    // 로컬 랭킹 관리 유틸리티 (구글 연결 실패 시 안전장치)
    function saveLocalScore(nickname, score) {
      try {
        // 이미 동일한 데이터가 추가되는 걸 방지하고 신규 삽입
        localScores.push([nickname, score]);
        // 내림차순 정렬
        localScores.sort((a, b) => b[1] - a[1]);
        // 상위 10개 커트라인 적용
        localScores = localScores.slice(0, 10);
        // 브라우저 캐시에 기록 보관 시도
        localStorage.setItem("neon_defense_local_rank", JSON.stringify(localScores));
      } catch (e) {
        console.warn("로컬 브라우저 저장이 차단되어 메모리 영역에만 유지됩니다.");
      }
    }

    function loadLocalScores() {
      try {
        const saved = localStorage.getItem("neon_defense_local_rank");
        if (saved) {
          localScores = JSON.parse(saved);
        }
      } catch (e) {
        console.warn("로컬 캐시를 읽지 못해 초기 템플릿 랭킹을 로드합니다.");
      }
      renderLeaderboard(localScores);
    }

    // 1. GET 방식으로 현재 리더보드 데이터 호출 (연결 오류 방지 보완)
    function fetchLeaderboard() {
      const refreshIcon = document.getElementById("refresh-icon");
      if (refreshIcon) refreshIcon.classList.add("animate-spin");

      fetch(GAS_URL, {
        method: "GET",
        mode: "cors"
      })
      .then(response => {
        if (!response.ok) {
          throw new Error("HTTP response status error: " + response.status);
        }
        return response.json();
      })
      .then(res => {
        if (res && res.status === "success") {
          renderLeaderboard(res.data);
        } else {
          throw new Error(res ? res.message : "Invalid payload framework");
        }
      })
      .catch(err => {
        console.warn("구글 리더보드 동기화 우회 (로컬 모드 가동):", err.message);
        // 사용자 피드백 안내 및 로컬 캐싱된 랭킹 표출
        showToast("알림 (오프라인)", "현재 로컬 장치에 기록된 랭킹을 활성화합니다.", "info");
        loadLocalScores();
      })
      .finally(() => {
        if (refreshIcon) refreshIcon.classList.remove("animate-spin");
      });
    }

    // 2. POST 방식으로 신규 점수 전송 및 실시간 갱신 받아오기
    function sendScoreToSheet(nickname, finalScore) {
      // 1순위로 브라우저 로컬 저장소에 우선 백업하여 무조건 기록 유실 방지
      saveLocalScore(nickname, finalScore);
      showToast("데이터 전송", "구글 서버에 안전하게 기록 중입니다...", "info");

      fetch(GAS_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain" // Apps Script CORS 우회용 필수 타입
        },
        body: JSON.stringify({
          nickname: nickname,
          score: finalScore
        })
      })
      .then(response => {
        if (!response.ok) {
          throw new Error("POST request returned status: " + response.status);
        }
        return response.json();
      })
      .then(res => {
        if (res && res.status === "success") {
          renderLeaderboard(res.data);
          showToast("기록 완료!", `${nickname}님의 점수(${finalScore}점)가 구글 시트에 업데이트 되었습니다.`, "success");
        } else {
          throw new Error(res ? res.message : "Failed to record properly");
        }
      })
      .catch(err => {
        console.warn("구글 시트 기록 불가 (로컬 오프라인 데이터 유지됨):", err);
        // 서버 전송 오류 시, 로컬 랭킹을 다시 갱신하여 뷰포트에 표시
        loadLocalScores();
        showToast("로컬 자동 백업 완료", "네트워크 지연으로 인해 장치에 로컬 보관되었습니다.", "success");
      });
    }

    // 리더보드 테이블 가공 후 렌더링
    function renderLeaderboard(scores) {
      const tbody = document.getElementById("scoreBody");
      tbody.innerHTML = "";

      if (!scores || scores.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" class="py-6 text-center text-slate-500 text-xs">최초 기록에 도전해 보세요!</td></tr>`;
        return;
      }

      scores.forEach((row, idx) => {
        const medalColor = idx === 0 ? "text-amber-400 font-extrabold" : idx === 1 ? "text-slate-300 font-extrabold" : idx === 2 ? "text-amber-600 font-extrabold" : "text-slate-400";
        const isSelf = row[0] === document.getElementById("nickname").value;

        const tr = document.createElement("tr");
        tr.className = `border-b border-slate-900 hover:bg-slate-900/30 transition-colors ${isSelf ? 'bg-cyan-950/20 text-cyan-400 font-semibold' : ''}`;
        tr.innerHTML = `
          <td class="py-2.5 px-3 text-center font-bold ${medalColor}">${idx + 1}</td>
          <td class="py-2.5 px-3 text-left truncate max-w-[120px]" title="${row[0]}">${row[0]}</td>
          <td class="py-2.5 px-3 text-right font-semibold cyber-font text-cyan-300">${row[1]}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // --- 게임 로직 및 엔진 구현 ---

    // 타워 빌드 타입 선택 UI 핸들러
    function selectTowerType(type) {
      selectedTowerType = type;
      // 전체 버튼 테두리 초기화
      document.querySelectorAll(".tower-select-btn").forEach(btn => {
        btn.classList.remove("border-cyan-500/50", "bg-cyan-950/20", "border-blue-500/50", "bg-blue-950/20", "border-fuchsia-500/50", "bg-fuchsia-950/20");
        btn.classList.add("border-slate-800", "bg-slate-900/40");
      });

      // 선택 활성화 스타일 적용
      const activeBtn = document.getElementById(`btn-tower-${type}`);
      activeBtn.classList.remove("border-slate-800", "bg-slate-900/40");
      if (type === 'basic') activeBtn.classList.add("border-cyan-500/50", "bg-cyan-950/20");
      if (type === 'frost') activeBtn.classList.add("border-blue-500/50", "bg-blue-950/20");
      if (type === 'laser') activeBtn.classList.add("border-fuchsia-500/50", "bg-fuchsia-950/20");
    }

    // 게임 시작 처리
    function startGame() {
      // 닉네임 유효성 검사
      const nicknameInput = document.getElementById("nickname");
      const name = nicknameInput.value.trim();
      if (!name) {
        showToast("알림", "랭킹 동기화를 위해 플레이어 이름을 꼭 입력해주세요.", "error");
        nicknameInput.focus();
        return;
      }

      // 게임 데이터 초기화
      life = 20;
      gold = 250;
      currentWave = 0;
      score = 0;
      towers = [];
      enemies = [];
      bullets = [];
      particles = [];
      spawnQueue = [];
      waveSpawning = false;

      updateStatsUI();

      // 오버레이 숨기기
      const overlay = document.getElementById("overlay");
      overlay.classList.add("opacity-0", "pointer-events-none");

      gameActive = true;
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);

      showToast("보안 모드 가동", `디펜스 시스템이 개시되었습니다. 타워를 건설하세요!`, "success");
      
      // 첫 번째 웨이브 트리거
      startWave();
    }

    // 다음 웨이브 활성화
    function startWave() {
      if (currentWave >= maxWaves) return;
      currentWave++;
      updateStatsUI();

      // 웨이브 생성 큐 제작 (웨이브 증가에 따라 속도, 체력 증가)
      waveSpawning = true;
      spawnTimer = 0;
      const count = 5 + currentWave * 3;
      const hp = 50 + currentWave * 45;
      const speed = 0.8 + currentWave * 0.12;

      for (let i = 0; i < count; i++) {
        // 보스는 5웨이브, 10웨이브 마다 출격
        const isBoss = (i === count - 1) && (currentWave % 5 === 0);
        spawnQueue.push({
          hp: isBoss ? hp * 4 : hp,
          maxHp: isBoss ? hp * 4 : hp,
          speed: isBoss ? speed * 0.7 : speed,
          size: isBoss ? 15 : 10,
          reward: isBoss ? 100 : 20,
          color: isBoss ? '#f43f5e' : (currentWave % 2 === 0 ? '#10b981' : '#f59e0b'),
          isBoss: isBoss
        });
      }
    }

    // 실시간 UI 갱신
    function updateStatsUI() {
      document.getElementById("stat-life").innerText = life;
      document.getElementById("stat-gold").innerText = gold;
      document.getElementById("stat-wave").innerText = `${currentWave}/${maxWaves}`;
      document.getElementById("stat-score").innerText = score;
    }

    // 캔버스 마우스 클릭 (타워 설치)
    canvas.addEventListener('click', function(e) {
      if (!gameActive) return;

      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      // 캔버스 상대 비율에 맞춤 
      const gameX = unscaleX(clickX);
      const gameY = unscaleY(clickY);

      // 1. 설치 비용 검증
      const spec = TOWER_SPECS[selectedTowerType];
      if (gold < spec.cost) {
        showToast("잔액 부족", "타워를 가동할 에너지가 부족합니다.", "error");
        return;
      }

      // 2. 경로 주변에 있는지 체크 (길 위에 건설 방지)
      if (isNearPath(gameX, gameY)) {
        showToast("건설 불가", "패킷 전송 경로에는 타워를 지을 수 없습니다.", "error");
        return;
      }

      // 3. 기존 타워와 겹치는지 체크
      let overlapping = false;
      for (let t of towers) {
        const dist = Math.hypot(t.x - gameX, t.y - gameY);
        if (dist < 30) {
          overlapping = true;
          break;
        }
      }
      if (overlapping) {
        showToast("건설 불가", "이미 다른 시스템(타워)이 가동 중인 위치입니다.", "error");
        return;
      }

      // 4. 타워 정상 추가
      towers.push({
        x: gameX,
        y: gameY,
        type: selectedTowerType,
        range: spec.range,
        color: spec.color,
        damage: spec.damage,
        speed: spec.speed,
        isFrost: spec.isFrost || false,
        label: spec.label,
        cooldown: 0
      });

      gold -= spec.cost;
      score += Math.floor(spec.cost / 2); // 건설 시 점수 보너스 제공
      updateStatsUI();
      createBuildParticle(gameX, gameY, spec.color);
    });

    // 특정 가상 좌표가 웨이포인트 경로와 너무 가까운지 여부 계산
    function isNearPath(gx, gy) {
      const tolerance = 25; // 경로 최소 격리 간격
      for (let i = 0; i < WAYPOINTS.length - 1; i++) {
        const p1 = { x: WAYPOINTS[i].x * BASE_WIDTH, y: WAYPOINTS[i].y * BASE_HEIGHT };
        const p2 = { x: WAYPOINTS[i+1].x * BASE_WIDTH, y: WAYPOINTS[i+1].y * BASE_HEIGHT };

        // 선분 p1-p2 에서 (gx, gy) 까지의 최단 거리 계산
        const A = gx - p1.x;
        const B = gy - p1.y;
        const C = p2.x - p1.x;
        const D = p2.y - p1.y;

        const dot = A * C + B * D;
        const lenSq = C * C + D * D;
        let param = -1;
        if (lenSq !== 0) param = dot / lenSq;

        let xx, yy;
        if (param < 0) {
          xx = p1.x;
          yy = p1.y;
        } else if (param > 1) {
          xx = p2.x;
          yy = p2.y;
        } else {
          xx = p1.x + param * C;
          yy = p1.y + param * D;
        }

        const distance = Math.hypot(gx - xx, gy - yy);
        if (distance < tolerance) return true;
      }
      return false;
    }

    // 이펙트 파티클 유틸리티
    function createBuildParticle(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 0.5) * 4,
          life: 30,
          color: color,
          size: Math.random() * 3 + 2
        });
      }
    }

    // 메인 루프 구현
    function gameLoop(time) {
      if (!gameActive) return;

      const dt = (time - lastTime) / 1000;
      lastTime = time;

      update(dt);
      draw();

      requestAnimationFrame(gameLoop);
    }

    // --- 물리 모델 및 상태 업데이트 ---
    function update(dt) {
      // 1. 몬스터 스폰 타임 관리
      if (waveSpawning) {
        spawnTimer += dt;
        if (spawnTimer >= 0.8) {
          spawnTimer = 0;
          if (spawnQueue.length > 0) {
            const proto = spawnQueue.shift();
            enemies.push({
              x: WAYPOINTS[0].x * BASE_WIDTH,
              y: WAYPOINTS[0].y * BASE_HEIGHT,
              waypointIdx: 0,
              hp: proto.hp,
              maxHp: proto.maxHp,
              speed: proto.speed,
              size: proto.size,
              reward: proto.reward,
              color: proto.color,
              isBoss: proto.isBoss,
              slowDuration: 0,
              baseSpeed: proto.speed
            });
          } else {
            waveSpawning = false;
          }
        }
      }

      // 2. 상태 이상 제어 (슬로우 지속 감쇄) 및 몬스터 이동
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        
        if (e.slowDuration > 0) {
          e.slowDuration -= dt;
          e.speed = e.baseSpeed * 0.5; // 동결 시 속도 절반으로 감소
        } else {
          e.speed = e.baseSpeed;
        }

        const targetNode = WAYPOINTS[e.waypointIdx + 1];
        if (!targetNode) continue;

        const targetX = targetNode.x * BASE_WIDTH;
        const targetY = targetNode.y * BASE_HEIGHT;

        const dx = targetX - e.x;
        const dy = targetY - e.y;
        const dist = Math.hypot(dx, dy);

        // 프레임 이동 속도 적용
        const step = e.speed * 60 * dt;
        
        if (dist <= step) {
          e.x = targetX;
          e.y = targetY;
          e.waypointIdx++;
          
          // 최종 방어선 통과 여부 확인
          if (e.waypointIdx >= WAYPOINTS.length - 1) {
            life -= e.isBoss ? 5 : 1;
            createBuildParticle(e.x, e.y, '#ef4444');
            enemies.splice(i, 1);
            updateStatsUI();

            // 라이프 소진 체크
            if (life <= 0) {
              endGame(false);
            }
            continue;
          }
        } else {
          e.x += (dx / dist) * step;
          e.y += (dy / dist) * step;
        }
      }

      // 3. 타워 연산 및 격발
      for (let t of towers) {
        if (t.cooldown > 0) t.cooldown -= dt;

        // 공격 사거리 내에 있는 가장 진격도가 높은 적 선택
        let target = null;
        let maxProgress = -1;

        for (let e of enemies) {
          const dist = Math.hypot(e.x - t.x, e.y - t.y);
          if (dist <= t.range) {
            const progress = e.waypointIdx + (1 - (Math.hypot(e.x - WAYPOINTS[e.waypointIdx].x * BASE_WIDTH, e.y - WAYPOINTS[e.waypointIdx].y * BASE_HEIGHT) / BASE_WIDTH));
            if (progress > maxProgress) {
              maxProgress = progress;
              target = e;
            }
          }
        }

        // 사격 가능 시 발사
        if (target && t.cooldown <= 0) {
          t.cooldown = 1 / t.speed;
          bullets.push({
            x: t.x,
            y: t.y,
            target: target,
            damage: t.damage,
            color: t.color,
            isFrost: t.isFrost,
            speed: 350
          });
        }
      }

      // 4. 투사체 연산
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        
        // 대상이 유효하지 않은 경우 무효화
        if (!enemies.includes(b.target)) {
          bullets.splice(i, 1);
          continue;
        }

        const dx = b.target.x - b.x;
        const dy = b.target.y - b.y;
        const dist = Math.hypot(dx, dy);
        const step = b.speed * dt;

        if (dist <= step) {
          // 타격 적용
          b.target.hp -= b.damage;
          if (b.isFrost) {
            b.target.slowDuration = 3.0; // 3초간 둔화 부여
          }

          // 파괴용 연출 생성
          createBuildParticle(b.target.x, b.target.y, b.color);
          
          // 적 처치 판정
          if (b.target.hp <= 0) {
            const idx = enemies.indexOf(b.target);
            if (idx > -1) {
              gold += b.target.reward;
              score += b.target.isBoss ? 150 : 30;
              updateStatsUI();
              enemies.splice(idx, 1);
            }
          }
          bullets.splice(i, 1);
        } else {
          b.x += (dx / dist) * step;
          b.y += (dy / dist) * step;
        }
      }

      // 5. 이펙트 파티클 감쇄 연산
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }

      // 6. 다음 웨이브 자동 개시 트래킹
      if (enemies.length === 0 && !waveSpawning && spawnQueue.length === 0) {
        if (currentWave < maxWaves) {
          startWave();
        } else {
          endGame(true); // 최고 한계 웨이브 클리어 시 클리어 승리
        }
      }
    }

    // --- 드로잉 렌더링 엔진 ---
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 1. 방어선 트랙 (경로 선) 그리기
      ctx.beginPath();
      ctx.lineWidth = scaleX(14);
      ctx.strokeStyle = "rgba(30, 41, 59, 0.6)";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      for (let i = 0; i < WAYPOINTS.length; i++) {
        const p = WAYPOINTS[i];
        if (i === 0) ctx.moveTo(scaleX(p.x * BASE_WIDTH), scaleY(p.y * BASE_HEIGHT));
        else ctx.lineTo(scaleX(p.x * BASE_WIDTH), scaleY(p.y * BASE_HEIGHT));
      }
      ctx.stroke();

      // 경로 내부 중심선 (네온 아우라 연출)
      ctx.beginPath();
      ctx.lineWidth = scaleX(3);
      ctx.strokeStyle = "rgba(6, 182, 212, 0.35)";
      for (let i = 0; i < WAYPOINTS.length; i++) {
        const p = WAYPOINTS[i];
        if (i === 0) ctx.moveTo(scaleX(p.x * BASE_WIDTH), scaleY(p.y * BASE_HEIGHT));
        else ctx.lineTo(scaleX(p.x * BASE_WIDTH), scaleY(p.y * BASE_HEIGHT));
      }
      ctx.stroke();

      // 2. 타워 렌더링
      for (let t of towers) {
        // 사거리 가이드라인 (반투명 서클 그리기)
        ctx.beginPath();
        ctx.arc(scaleX(t.x), scaleY(t.y), scaleX(t.range), 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
        ctx.strokeStyle = "rgba(255, 255, 255, 0.07)";
        ctx.lineWidth = 1;
        ctx.fill();
        ctx.stroke();

        // 메인 타워 실체
        ctx.beginPath();
        ctx.arc(scaleX(t.x), scaleY(t.y), scaleX(13), 0, Math.PI * 2);
        ctx.fillStyle = "#1e293b";
        ctx.strokeStyle = t.color;
        ctx.lineWidth = scaleX(3);
        ctx.fill();
        ctx.stroke();

        // 중앙 코어
        ctx.beginPath();
        ctx.arc(scaleX(t.x), scaleY(t.y), scaleX(5), 0, Math.PI * 2);
        ctx.fillStyle = t.color;
        ctx.fill();

        // 텍스트 라벨
        ctx.fillStyle = "#ffffff";
        ctx.font = `bold ${Math.floor(scaleX(9))}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(t.label, scaleX(t.x), scaleY(t.y) - scaleY(1));
      }

      // 3. 적 몬스터 렌더링
      for (let e of enemies) {
        // 메인 몸체 원형 그리기
        ctx.beginPath();
        ctx.arc(scaleX(e.x), scaleY(e.y), scaleX(e.size), 0, Math.PI * 2);
        ctx.fillStyle = e.color;
        
        // 동결 슬로우 상태라면 파란색 테두리 아우라 추가
        if (e.slowDuration > 0) {
          ctx.shadowColor = "#60a5fa";
          ctx.shadowBlur = 10;
          ctx.strokeStyle = "#93c5fd";
          ctx.lineWidth = scaleX(2.5);
          ctx.stroke();
        }
        ctx.fill();
        ctx.shadowBlur = 0; // 그림자 초기화

        // 체력 바 인터페이스
        const barW = scaleX(e.size * 2);
        const barH = scaleY(3);
        const barX = scaleX(e.x) - barW / 2;
        const barY = scaleY(e.y) - scaleY(e.size + 8);

        // 체력바 배경(Black)
        ctx.fillStyle = "#020617";
        ctx.fillRect(barX, barY, barW, barH);

        // 체력 잔여 비율
        const ratio = Math.max(0, e.hp / e.maxHp);
        ctx.fillStyle = ratio > 0.5 ? "#10b981" : ratio > 0.25 ? "#f59e0b" : "#ef4444";
        ctx.fillRect(barX, barY, barW * ratio, barH);
      }

      // 4. 발사 탄환 드로잉
      for (let b of bullets) {
        ctx.beginPath();
        ctx.arc(scaleX(b.x), scaleY(b.y), scaleX(4.5), 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // 5. 입자 이펙트 드로잉
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(scaleX(p.x), scaleY(p.y), scaleX(p.size), 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 30; // 투명화 페이드
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
    }

    // --- 게임 피날레 관리 (성공 / 실패) ---
    function endGame(isVictory) {
      gameActive = false;
      const nickname = document.getElementById("nickname").value.trim() || "NeonPlayer";

      const overlay = document.getElementById("overlay");
      const overlayIcon = document.getElementById("overlay-icon");
      const overlayTitle = document.getElementById("overlay-title");
      const overlayDesc = document.getElementById("overlay-desc");
      const overlayBtn = document.getElementById("overlay-btn");

      overlay.classList.remove("opacity-0", "pointer-events-none");

      if (isVictory) {
        // 최종 스테이지 클리어 승리
        const finalScore = score + (life * 150); // 남은 라이프에 따라 막강한 보너스 부여
        overlayIcon.className = "text-amber-400 mb-3 animate-bounce";
        overlayIcon.innerHTML = `<i data-lucide="trophy" class="w-16 h-16"></i>`;
        overlayTitle.innerText = "DEFENSE COMPLETION!";
        overlayTitle.className = "text-3xl font-black mb-2 tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-500";
        overlayDesc.innerHTML = `<span class="text-cyan-400 font-bold">${nickname}</span> 님, 완벽한 보안 시스템을 구축하여 보스 웨이브 방어에 성공했습니다!<br/><br/><span class="text-slate-400 text-lg">최종 가동 가치: <b class="text-yellow-400 cyber-font">${finalScore}점</b></span>`;
        
        // 구글 시트에 즉각적 비동기 기록 전송
        sendScoreToSheet(nickname, finalScore);
      } else {
        // 방어 실패 게임오버
        overlayIcon.className = "text-rose-500 mb-3";
        overlayIcon.innerHTML = `<i data-lucide="shield-off" class="w-16 h-16"></i>`;
        overlayTitle.innerText = "SYSTEM BREAKDOWN";
        overlayTitle.className = "text-3xl font-black mb-2 tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-red-600";
        overlayDesc.innerHTML = `서버의 메인 게이트 방어선이 완전히 침투당했습니다.<br/><br/><span class="text-slate-400 text-lg">기록된 점수: <b class="text-red-400 cyber-font">${score}점</b></span>`;
        
        // 구글 시트에 즉각적 비동기 기록 전송
        sendScoreToSheet(nickname, score);
      }
      
      overlayBtn.innerText = "다시 시도 (RESTART)";
      lucide.createIcons();
    }
  </script>
